<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Keys ADM - JulsonGames</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#0a001f,#1a0033,#2d0052);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:rgba(15,23,50,0.95);backdrop-filter:blur(10px);border:2px solid #00f5ff;padding:35px;border-radius:25px;width:100%;max-width:480px;box-shadow:0 0 50px rgba(0,245,255,0.4);animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{box-shadow:0 0 20px rgba(0,245,255,0.3)}100%{box-shadow:0 0 60px rgba(0,245,255,0.7)}}
h1{text-align:center;color:#00f5ff;margin-bottom:30px;font-size:26px;text-shadow:0 0 20px rgba(0,245,255,0.5)}
h1 i{margin-right:12px;animation:spin 4s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.login,.gerador{display:none}
.login.active,.gerador.active{display:block;animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
input{width:100%;padding:16px;margin:12px 0;border:none;border-radius:14px;background:rgba(17,26,53,0.8);color:#fff;font-size:16px;outline:2px solid rgba(0,245,255,0.3);transition:0.3s}
input:focus{outline:2px solid #00ff88;box-shadow:0 0 20px rgba(0,255,136,0.5);background:rgba(17,26,53,1)}
button{width:100%;padding:16px;margin-top:18px;border:none;border-radius:14px;background:linear-gradient(135deg,#00ff88,#00cc66);color:#0a001f;font-size:17px;font-weight:bold;cursor:pointer;transition:0.3s;position:relative;overflow:hidden}
button::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,0.3);transform:translate(-50%,-50%);transition:width 0.6s,height 0.6s}
button:active::before{width:300px;height:300px}
button:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,255,136,0.5)}
button:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.result{margin-top:25px;padding:25px;background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,200,100,0.1));border:2px dashed #00ff88;border-radius:18px;text-align:center;display:none;animation:pop 0.6s cubic-bezier(0.68,-0.55,0.265,1.55)}
@keyframes pop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
.key-gerada{font-size:22px;color:#00ff88;font-weight:bold;letter-spacing:3px;margin:18px 0;word-break:break-all;text-shadow:0 0 15px rgba(0,255,136,0.6);background:rgba(0,0,0,0.3);padding:12px;border-radius:10px}
.valor-gerado{color:#ffaa00;font-size:20px;margin-bottom:18px;font-weight:bold}
.msg{margin-top:15px;padding:14px;border-radius:12px;display:none;font-weight:bold;text-align:center;animation:slideDown 0.3s ease}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.error{background:linear-gradient(135deg,rgba(255,0,50,0.25),rgba(200,0,40,0.2));border:1px solid #ff0033;color:#ff6688}
.success{background:linear-gradient(135deg,rgba(0,255,120,0.25),rgba(0,200,90,0.2));border:1px solid #00ff88;color:#66ffaa}
.copy-btn{background:linear-gradient(135deg,#0099ff,#0066cc);color:#fff;margin-top:12px}
.copy-btn.copiado{background:linear-gradient(135deg,#00ff88,#00cc66);color:#0a001f}
.info-box{margin-top:20px;padding:12px;background:rgba(0,170,255,0.1);border-left:4px solid #00bfff;border-radius:8px;font-size:13px;color:#88ddff}
footer{text-align:center;margin-top:25px;font-size:12px;color:#666}
</style>
</head>
<body>

<div class="box">
  <h1><i class="fa-solid fa-key"></i> PAINEL ADM KEYS</h1>

  <!-- LOGIN ADM -->
  <div class="login active" id="loginBox">
    <input type="password" id="senhaAdm" placeholder="🔐 Digite a Key ADM: " autocomplete="off">
    <button onclick="entrar()"><i class="fa-solid fa-door-open"></i> ACESSAR PAINEL</button>
    <div class="msg error" id="msgLogin"></div>
    <div class="info-box">💡 Julson Games</div>
  </div>

  <!-- GERADOR -->
  <div class="gerador" id="geradorBox">
    <input type="number" id="valorMZN" placeholder="💰 Quantos MZNs? Min: 50 Max: 10000" min="50" max="10000">
    <button onclick="gerarKey()" id="btnGerar"><i class="fa-solid fa-wand-magic-sparkles"></i> GERAR KEY</button>
    <div class="msg error" id="msgErro"></div>

    <!-- RESULTADO COM ANIMAÇÃO -->
    <div class="result" id="resultado">
      <div style="color:#00ff88;font-weight:bold;font-size:18px"><i class="fa-solid fa-circle-check"></i> KEY GERADA COM SUCESSO!</div>
      <div class="valor-gerado" id="valorShow"></div>
      <div class="key-gerada" id="keyShow"></div>
      <button class="copy-btn" id="btnCopy" onclick="copiarKey()"><i class="fa-solid fa-copy"></i> COPIAR KEY</button>
      <div class="msg success" id="msgCopy" style="margin-top:10px">✅ Key salva no key.json automaticamente!</div>
    </div>
  </div>

  <footer>JulsonGames ADM Panel © 2026 • Criado por Julson Julião Paiva</footer>
</div>

<script>
// AUTO DETECTA SE É LOCALHOST OU HOSPEDAGEM
const API = window.location.hostname === "localhost" 
  ? "http://localhost:8080" 
  : window.location.origin;

let keyAtual = "";

function mostrarMsg(id, texto, tipo="error"){
  const el = document.getElementById(id);
  el.innerText = texto;
  el.className = `msg ${tipo}`;
  el.style.display = "block";
  setTimeout(()=> el.style.display = "none", 4000);
}

function entrar(){
  const senha = document.getElementById("senhaAdm").value.trim();
  if(senha === "JULSON2010"){
    document.getElementById("loginBox").classList.remove("active");
    document.getElementById("geradorBox").classList.add("active");
    mostrarMsg("msgCopy", "✅ Acesso liberado! Bem-vindo ADM.", "success");
  } else {
    mostrarMsg("msgLogin", "❌ Senha ADM incorreta!");
    document.getElementById("senhaAdm").value = "";
  }
}

async function gerarKey(){
  const valor = Number(document.getElementById("valorMZN").value);
  const btn = document.getElementById("btnGerar");
  
  if(!valor || isNaN(valor)){
    mostrarMsg("msgErro", "❌ Digita um número válido!");
    return;
  }
  if(valor < 50 || valor > 10000){
    mostrarMsg("msgErro", "❌ Valor deve ser entre 50 e 10000 MZN!");
    return;
  }

  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GERANDO KEY...';
  btn.disabled = true;

  try{
    const r = await fetch(`${API}/api/gerar-key-adm`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({senha: "JULSON2010", valor: valor})
    });
    
    if(!r.ok) throw new Error(`Servidor respondeu ${r.status}`);
    
    const d = await r.json();

    if(d.success){
      keyAtual = d.key;
      document.getElementById("keyShow").innerText = d.key;
      document.getElementById("valorShow").innerText = `💎 Valor: ${d.valor} MZN`;
      document.getElementById("resultado").style.display = "block";
      document.getElementById("valorMZN").value = "";
      mostrarMsg("msgCopy", "✅ Key criada e salva no key.json!", "success");
      
      // Efeito sonoro visual kkk
      document.getElementById("resultado").scrollIntoView({behavior:"smooth"});
    } else {
      mostrarMsg("msgErro", "❌ " + d.message);
    }
  } catch(err){
    console.error("ERRO COMPLETO:", err);
    mostrarMsg("msgErro", `❌ Erro ao conectar! Verifica se servidor tá rodando em ${API}`);
  }

  btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> GERAR KEY';
  btn.disabled = false;
}

function copiarKey(){
  navigator.clipboard.writeText(keyAtual).then(()=>{
    const btn = document.getElementById("btnCopy");
    btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIADO!';
    btn.classList.add("copiado");
    mostrarMsg("msgCopy", "✅ Key copiada pra área de transferência!", "success");
    setTimeout(()=>{
      btn.innerHTML = '<i class="fa-solid fa-copy"></i> COPIAR KEY';
      btn.classList.remove("copiado");
    }, 2500);
  }).catch(()=>{
    mostrarMsg("msgErro", "❌ Não consegui copiar. Copia manual: " + keyAtual);
  });
}

// Enter pra acessar e gerar
document.getElementById("senhaAdm").addEventListener("keypress", e=>{
  if(e.key === "Enter") entrar();
});
document.getElementById("valorMZN").addEventListener("keypress", e=>{
  if(e.key === "Enter") gerarKey();
});
</script>

</body>
</html>
