<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JulsonCrash</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0b1020;
color:#fff;
overflow-x:hidden;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
border-bottom:2px solid #ff004c;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff004c;
}

.saldo{
background:#1e293b;
padding:10px 16px;
border-radius:50px;
font-weight:bold;
color:#00ff88;
}

/* HISTÓRICO */

.historico{
display:flex;
gap:8px;
overflow:auto;
padding:10px;
background:#0f172a;
}

.historico::-webkit-scrollbar{
display:none;
}

.h-item{
padding:7px 14px;
border-radius:30px;
font-weight:bold;
white-space:nowrap;
}

.low{
background:#ff0033;
}

.mid{
background:#9333ea;
}

.high{
background:#00bfff;
}

/* GAME */

.game{
position:relative;
height:350px;
overflow:hidden;
background:
radial-gradient(circle at bottom left,#102040,#000);
}

/* RAIOS */

.game::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
repeating-linear-gradient(
-30deg,
transparent 0px,
transparent 35px,
rgba(255,255,255,0.03) 36px,
transparent 37px
);
animation:bgmove 12s linear infinite;
}

@keyframes bgmove{
0%{transform:translateX(0);}
100%{transform:translateX(-300px);}
}

/* STATUS */

.status{
position:absolute;
top:15px;
left:15px;
font-size:22px;
font-weight:bold;
z-index:5;
}

.fly{
color:#00ff88;
}

.crash{
color:#ff0033;
}

/* MULTIPLICADOR */

.multi{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
font-weight:bold;
z-index:4;
text-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* AVIÃO */

.plane{
position:absolute;
left:20px;
bottom:30px;
font-size:42px;
z-index:10;
transition:0.1s linear;
filter:drop-shadow(0 0 10px #ff0033);
}

/* RASTRO */

.trail{
position:absolute;
height:4px;
background:linear-gradient(90deg,#ff004c,transparent);
z-index:2;
transform-origin:left;
}

/* PAINEL */

.panel{
padding:15px;
background:#111827;
}

.box{
background:#1f2937;
padding:20px;
border-radius:20px;
}

.box h2{
margin-bottom:15px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:#0f172a;
color:#fff;
font-size:18px;
text-align:center;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.apostar{
background:#00cc44;
color:#fff;
}

.sacar{
background:#ff8800;
color:#fff;
}

.wait{
background:#555;
color:#fff;
}

/* MSG */

.msg{
margin-top:15px;
padding:14px;
border-radius:12px;
display:none;
font-weight:bold;
line-height:1.7;
}

.success{
background:rgba(0,255,120,0.15);
border:1px solid #00ff88;
color:#00ff88;
}

.error{
background:rgba(255,0,50,0.15);
border:1px solid #ff0033;
color:#ff4466;
}

.info{
background:rgba(0,170,255,0.12);
border:1px solid #00bfff;
color:#00d9ff;
}

footer{
text-align:center;
padding:30px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-plane-up"></i>
JulsonCrash
</div>

<div class="saldo">
💰 <span id="saldo">0.00</span> MZN
</div>

</header>

<!-- HISTÓRICO -->
<div class="historico" id="historico"></div>

<!-- GAME -->
<div class="game">

<div class="status fly" id="status">
✈️ AGUARDANDO APOSTA
</div>

<div class="multi" id="multi">
1.00x
</div>

<div class="trail" id="trail"></div>

<div class="plane" id="plane">
✈️
</div>

</div>

<!-- PANEL -->
<div class="panel">

<div class="box">

<h2>🎮 Apostar</h2>

<input type="number" id="valor" placeholder="Digite valor da aposta">

<button class="apostar" id="btn" onclick="apostar()">
APOSTAR
</button>

<div class="msg info" id="msg"></div>

</div>

</div>

<footer>
&copy; 2026 Criado por Julson Julião Paiva<br>
Moçambique 🇲🇿 • Todos os direitos reservados.
</footer>

<script>

let saldo=0;
let aposta=0;
let multiplicador=1;
let voando=false;
let sacado=false;
let podeApostar=true;
let crashPoint=1;
let interval;

const plane=document.getElementById("plane");
const trail=document.getElementById("trail");

function mostrarMsg(texto,tipo){

const msg=document.getElementById("msg");

msg.style.display="block";
msg.className=`msg ${tipo}`;
msg.innerHTML=texto;

}

/* SALDO */

async function carregarSaldo(){

const nome=localStorage.getItem("userName");

if(!nome){

location.href="login.html";
return;

}

try{

const r=await fetch(`/api/perfil/${nome}`);
const d=await r.json();

saldo=Number(d.user.saldo||0);

document.getElementById("saldo").innerText=
saldo.toFixed(2);

}catch(err){

mostrarMsg(
"❌ Servidor offline.",
"error"
);

}

}

/* GERAR QUEDA */

function gerarCrash(){

const n=Math.random();

/* MUITO FREQUENTE */
if(n<0.50){

return +(Math.random()*2+1).toFixed(2);

}

/* FREQUENTE */
if(n<0.85){

return +(Math.random()*4+3).toFixed(2);

}

/* RARO */
if(n<0.96){

return +(Math.random()*15+7).toFixed(2);

}

/* MUITO RARO */
if(n<0.995){

return +(Math.random()*40+20).toFixed(2);

}

/* ULTRA RARO */
return +(Math.random()*50+50).toFixed(2);

}

/* APOSTAR */

async function apostar(){

if(voando){

sacar();
return;

}

if(!podeApostar){

mostrarMsg(
"⏳ Espera o avião cair primeiro.",
"info"
);

return;

}

const valor=Number(
document.getElementById("valor").value
);

if(!valor || valor<=0){

mostrarMsg(
"❌ Digite valor válido.",
"error"
);

return;

}

if(valor>saldo){

mostrarMsg(
"❌ Saldo insuficiente.",
"error"
);

return;

}

const nome=localStorage.getItem("userName");

try{

const r=await fetch(
"/api/comprar",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:nome,
valor:valor
})
});

const d=await r.json();

if(!d.success){

mostrarMsg(
"❌ "+d.message,
"error"
);

return;

}

saldo=d.saldo;

document.getElementById("saldo").innerText=
saldo.toFixed(2);

aposta=valor;

iniciar();

}catch(err){

mostrarMsg(
"❌ Servidor offline.",
"error"
);

}

}

/* INICIAR VOO */

function iniciar(){

voando=true;
sacado=false;
podeApostar=false;

multiplicador=1;

crashPoint=gerarCrash();

let x=20;
let y=30;

document.getElementById("status").innerHTML=
"✈️ VOANDO...";

document.getElementById("status").className=
"status fly";

const btn=document.getElementById("btn");

btn.innerHTML=
`SACAR ${(aposta*1).toFixed(2)} MZN`;

btn.className="sacar";

interval=setInterval(()=>{

multiplicador+=0.02;

x+=2.4;
y+=1.2;

if(x>window.innerWidth-70){

x=window.innerWidth-70;

}

if(y>270){

y=270;

}

plane.style.left=x+"px";
plane.style.bottom=y+"px";

trail.style.left="0px";
trail.style.bottom=(y+18)+"px";
trail.style.width=x+"px";

document.getElementById("multi").innerText=
multiplicador.toFixed(2)+"x";

const valor=(aposta*multiplicador).toFixed(2);

if(!sacado){

btn.innerHTML=
`SACAR ${valor} MZN`;

}

if(multiplicador>=crashPoint){

clearInterval(interval);

cair();

}

},100);

}

/* SACAR */

async function sacar(){

if(!voando || sacado)return;

sacado=true;

const ganho=+(aposta*multiplicador).toFixed(2);

saldo+=ganho;

document.getElementById("saldo").innerText=
saldo.toFixed(2);

const nome=localStorage.getItem("userName");

try{

await fetch(
"/api/add-saldo",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:nome,
valor:ganho
})
});

}catch(err){}

mostrarMsg(
`💸 Sacaste ${ganho.toFixed(2)} MZN com ${multiplicador.toFixed(2)}x`,
"success"
);

const btn=document.getElementById("btn");

btn.innerHTML="✅ SACADO";
btn.className="wait";

}

/* QUEDA */

function cair(){

voando=false;

document.getElementById("status").innerHTML=
`💥 CAIU EM ${crashPoint.toFixed(2)}x`;

document.getElementById("status").className=
"status crash";

adicionarHistorico(crashPoint);

if(!sacado){

mostrarMsg(
`💥 O avião caiu em ${crashPoint.toFixed(2)}x<br>❌ Perdeste ${aposta.toFixed(2)} MZN`,
"error"
);

}

const btn=document.getElementById("btn");

btn.innerHTML="APOSTAR";
btn.className="apostar";

setTimeout(()=>{

resetar();

},2500);

}

/* RESET */

function resetar(){

multiplicador=1;

document.getElementById("multi").innerHTML=
"1.00x";

document.getElementById("status").innerHTML=
"✈️ AGUARDANDO APOSTA";

document.getElementById("status").className=
"status fly";

plane.style.left="20px";
plane.style.bottom="30px";

trail.style.width="0px";

podeApostar=true;

}

/* HISTÓRICO */

function adicionarHistorico(valor){

const div=document.createElement("div");

let cls="low";

if(valor>=3) cls="mid";
if(valor>=10) cls="high";

div.className=`h-item ${cls}`;

div.innerText=valor.toFixed(2)+"x";

document.getElementById("historico")
.prepend(div);

}

window.onload=carregarSaldo;

</script>

</body>
</html>
